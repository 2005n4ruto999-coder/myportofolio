<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>For Rawan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --pink: #ff5ca8;
        --pink-soft: rgba(255, 92, 168, 0.3);
        --pink-bright: rgba(255, 177, 220, 0.95);
        --text: rgba(255, 255, 255, 0.96);
        --muted: rgba(255, 255, 255, 0.56);
        --card-bg: rgba(10, 8, 14, 0.56);
        --card-border: rgba(255, 255, 255, 0.14);
        --lock-offset: 11rem;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: "Inter", sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
        pointer-events: none;
        opacity: 1;
        transition: opacity 900ms ease;
      }

      body.is-revealed canvas {
        opacity: 0;
      }

      .scene {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      .center-copy {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate3d(-50%, -50%, 0);
        text-align: center;
        opacity: 1;
        transition: opacity 520ms ease, transform 520ms ease;
        will-change: opacity, transform;
      }

      .center-copy h1 {
        margin: 0;
        font-size: clamp(1.2rem, 2.15vw, 2.65rem);
        font-weight: 700;
        letter-spacing: 0.01em;
        color: rgba(255, 252, 255, 0.98);
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.7),
          0 0 20px rgba(255, 92, 168, 0.55),
          0 0 42px rgba(255, 92, 168, 0.32);
      }

      body.is-unlocking .center-copy {
        opacity: 0;
        transform: translate3d(-50%, -50%, 0) scale(0.96);
      }

      .lock-panel {
        position: absolute;
        left: 50%;
        top: calc(50% + var(--lock-offset));
        transform: translate3d(-50%, -50%, 0);
        width: min(90vw, 18rem);
        display: grid;
        gap: 0.8rem;
        justify-items: center;
        pointer-events: auto;
        opacity: 1;
        transition: opacity 520ms ease, transform 520ms ease;
        will-change: opacity, transform;
      }

      body.is-unlocking .lock-panel {
        opacity: 0;
        transform: translate3d(-50%, -50%, 0) translateY(0.8rem);
      }

      .lock-label {
        font-size: clamp(0.68rem, 0.9vw, 0.82rem);
        font-weight: 600;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--muted);
        text-indent: 0.34em;
      }

      .lock-shell {
        position: relative;
        width: 100%;
        cursor: text;
      }

      .lock-display {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.55rem;
        padding: 0.55rem;
        border-radius: 1.2rem;
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 18px 44px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
      }

      .lock-shell.is-filled .lock-display {
        border-color: rgba(255, 92, 168, 0.34);
        box-shadow:
          0 0 0 1px rgba(255, 92, 168, 0.16) inset,
          0 0 26px rgba(255, 92, 168, 0.12),
          0 18px 44px rgba(0, 0, 0, 0.45);
      }

      .lock-shell.is-shake .lock-display {
        animation: shake 360ms linear;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }
        20% {
          transform: translate3d(-0.35rem, 0, 0);
        }
        40% {
          transform: translate3d(0.35rem, 0, 0);
        }
        60% {
          transform: translate3d(-0.2rem, 0, 0);
        }
        80% {
          transform: translate3d(0.2rem, 0, 0);
        }
      }

      .lock-slot {
        display: grid;
        place-items: center;
        height: clamp(2.8rem, 5vw, 3.85rem);
        border-radius: 0.92rem;
        border: 1px solid rgba(255, 255, 255, 0.09);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.02)),
          rgba(8, 8, 12, 0.35);
        color: rgba(255, 255, 255, 0.96);
        font-size: clamp(1rem, 2.3vw, 1.5rem);
        font-weight: 700;
        letter-spacing: 0.22em;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 12px rgba(255, 92, 168, 0.55);
        box-shadow: 0 0 18px rgba(255, 92, 168, 0.08) inset;
      }

      .lock-slot.is-empty {
        color: rgba(255, 255, 255, 0.22);
      }

      .lock-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        border: 0;
        outline: none;
        background: transparent;
        color: transparent;
        caret-color: transparent;
      }

      .content-card {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 3;
        width: min(90vw, 38rem);
        padding: clamp(1.25rem, 3vw, 2.2rem);
        border-radius: 1.8rem;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow:
          0 24px 72px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.04) inset;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        transform: translate3d(-50%, -50%, 0) scale(0.94);
        opacity: 0;
        pointer-events: none;
        transition: opacity 820ms ease, transform 820ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: opacity, transform;
      }

      body.is-revealed .content-card {
        opacity: 1;
        transform: translate3d(-50%, -50%, 0) scale(1);
        pointer-events: auto;
      }

      .card-inner {
        display: grid;
        gap: 1rem;
        justify-items: center;
        text-align: center;
      }

      .card-heart {
        width: clamp(2rem, 4vw, 2.85rem);
        height: clamp(2rem, 4vw, 2.85rem);
        display: grid;
        place-items: center;
        border-radius: 50%;
        font-size: clamp(1.2rem, 2vw, 1.65rem);
        color: rgba(255, 255, 255, 0.98);
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.85),
          0 0 24px rgba(255, 92, 168, 0.8);
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.18), rgba(255, 92, 168, 0.2) 42%, rgba(255, 92, 168, 0.05) 66%, transparent 74%);
        box-shadow: 0 0 24px rgba(255, 92, 168, 0.22);
      }

      .card-copy {
        margin: 0;
        direction: rtl;
        text-align: right;
        font-family: sans-serif;
        font-size: clamp(0.95rem, 1.45vw, 1.08rem);
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.86);
      }

      @media (max-width: 768px) {
        .lock-panel {
          width: min(88vw, 18rem);
        }

        .content-card {
          width: min(92vw, 34rem);
        }
      }

      @media (max-height: 560px) and (orientation: landscape) {
        .content-card {
          max-height: 86vh;
          overflow: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="heartCanvas" aria-hidden="true"></canvas>

    <main class="scene" aria-label="Romantic unlock experience">
      <div class="center-copy" id="centerCopy">
        <h1>I love you, Rawan</h1>
      </div>

      <section class="lock-panel" aria-label="Password lock">
        <div class="lock-label">Enter code</div>
        <div class="lock-shell" id="lockShell">
          <div class="lock-display" aria-hidden="true">
            <div class="lock-slot is-empty" data-slot="0">&#8226;</div>
            <div class="lock-slot is-empty" data-slot="1">&#8226;</div>
            <div class="lock-slot is-empty" data-slot="2">&#8226;</div>
          </div>
          <input
            id="lockInput"
            class="lock-input"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            maxlength="3"
            autocomplete="one-time-code"
            aria-label="Three digit password"
            spellcheck="false"
          />
        </div>
      </section>
    </main>

    <section class="content-card" id="contentCard" aria-hidden="true">
      <div class="card-inner">
        <div class="card-heart">&#9829;</div>
        <!-- ARABIC PARAGRAPH PLACEHOLDER: Replace the text below with your Arabic romantic message. -->
        <p class="card-copy" lang="ar" dir="rtl">Arabic paragraph placeholder</p>
      </div>
    </section>

    <script>
      (() => {
        const canvas = document.getElementById("heartCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
        const lockShell = document.getElementById("lockShell");
        const lockInput = document.getElementById("lockInput");
        const lockSlots = Array.from(document.querySelectorAll(".lock-slot"));
        const contentCard = document.getElementById("contentCard");

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const state = {
          width: 0,
          height: 0,
          dpr: Math.min(window.devicePixelRatio || 1, 2),
          scale: 0,
          offset: 0,
          bounds: null,
          mode: "locked",
          unlockStarted: 0,
          nodes: [],
          sparks: [],
        };

        let lastFrameTime = performance.now();
        let resizeTimer = 0;

        const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
        const easeOutCubic = (value) => 1 - Math.pow(1 - value, 3);

        function heartField(x, y) {
          const p = x * x + y * y - 1;
          return p * p * p - x * x * y * y * y;
        }

        function makeNode(baseX, baseY, isContour = false) {
          return {
            baseX,
            baseY,
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            phase: Math.random() * Math.PI * 2,
            drift: 0.7 + Math.random() * 1.35,
            xFloat: 0.012 + Math.random() * 0.016,
            yFloat: 0.012 + Math.random() * 0.016,
            size: isContour ? 1.55 + Math.random() * 1.2 : 1.05 + Math.random() * 1.65,
            alpha: isContour ? 0.96 : 0.72 + Math.random() * 0.22,
            contour: isContour,
            free: false,
            fade: 1,
            spin: Math.random() * Math.PI * 2,
          };
        }

        function rebuildNodes() {
          const nodes = [];
          const bounds = {
            minX: Infinity,
            maxX: -Infinity,
            minY: Infinity,
            maxY: -Infinity,
          };
          const shortest = Math.min(state.width, state.height);
          const cols = clamp(Math.round(shortest / 32), 16, 26);
          const rows = Math.round(cols * 1.14);
          const xSpan = 2.7;
          const ySpan = 3.05;

          for (let row = 0; row < rows; row += 1) {
            for (let col = 0; col < cols; col += 1) {
              const jitterX = (Math.random() - 0.5) * 0.28;
              const jitterY = (Math.random() - 0.5) * 0.28;
              const x = ((col + 0.5 + jitterX) / cols - 0.5) * xSpan;
              const y = (0.5 - (row + 0.5 + jitterY) / rows) * ySpan;
              if (heartField(x * 1.02, y * 1.08) <= 0) {
                nodes.push(makeNode(x, y, false));
                bounds.minX = Math.min(bounds.minX, x);
                bounds.maxX = Math.max(bounds.maxX, x);
                bounds.minY = Math.min(bounds.minY, y);
                bounds.maxY = Math.max(bounds.maxY, y);
              }
            }
          }

          const contourCount = clamp(Math.round(cols * 1.45), 24, 36);
          for (let index = 0; index < contourCount; index += 1) {
            const t = (index / contourCount) * Math.PI * 2;
            const px = 16 * Math.pow(Math.sin(t), 3);
            const py = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            const baseX = (px / 18) * 0.92;
            const baseY = (py / 18) * 0.92;
            nodes.push(makeNode(baseX, baseY, true));
            bounds.minX = Math.min(bounds.minX, baseX);
            bounds.maxX = Math.max(bounds.maxX, baseX);
            bounds.minY = Math.min(bounds.minY, baseY);
            bounds.maxY = Math.max(bounds.maxY, baseY);
          }

          state.nodes = nodes;
          state.bounds = bounds;
        }

        function syncLayout(time) {
          const cx = state.width * 0.5;
          const cy = state.height * 0.5;
          const pulse = 1 + Math.sin(time * 0.0014) * (prefersReducedMotion ? 0.006 : 0.018);
          const scale = state.scale * pulse;

          for (const node of state.nodes) {
            if (node.free) {
              continue;
            }

            const wobbleX = Math.sin(time * 0.0015 * node.drift + node.phase) * node.xFloat;
            const wobbleY = Math.cos(time * 0.0013 * node.drift + node.phase * 1.35) * node.yFloat;
            node.x = cx + (node.baseX + wobbleX) * scale;
            node.y = cy - (node.baseY + wobbleY) * scale;
          }
        }

        function updateCanvasSize() {
          state.width = window.innerWidth;
          state.height = window.innerHeight;
          state.dpr = Math.min(window.devicePixelRatio || 1, 2);

          canvas.width = Math.round(state.width * state.dpr);
          canvas.height = Math.round(state.height * state.dpr);
          canvas.style.width = `${state.width}px`;
          canvas.style.height = `${state.height}px`;
          ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
          ctx.imageSmoothingEnabled = true;

          state.scale = Math.min(state.width * 0.23, state.height * 0.21);

          if (!state.nodes.length) {
            rebuildNodes();
          }

          const bottomExtent = state.bounds ? Math.abs(state.bounds.minY) : 1.45;
          state.offset = Math.min(bottomExtent * state.scale + 76, state.height * 0.42);
          document.documentElement.style.setProperty("--lock-offset", `${Math.round(state.offset)}px`);

          if (state.mode === "locked") {
            syncLayout(performance.now());
          }
        }

        function setLockSlots(value) {
          const digits = value.split("");
          lockSlots.forEach((slot, index) => {
            const digit = digits[index] ?? "\u2022";
            slot.textContent = digit;
            slot.classList.toggle("is-empty", !digits[index]);
          });
          lockShell.classList.toggle("is-filled", value.length > 0);
        }

        function shakeLock() {
          lockShell.classList.add("is-shake");
          window.setTimeout(() => lockShell.classList.remove("is-shake"), 360);
        }

        function focusLockInput() {
          try {
            lockInput.focus({ preventScroll: true });
          } catch {
            lockInput.focus();
          }
        }

        function addSpark(x, y, vx, vy, size) {
          state.sparks.push({
            x,
            y,
            vx,
            vy,
            size,
            life: 1,
            spin: Math.random() * Math.PI * 2,
            twinkle: 0.65 + Math.random() * 0.35,
          });
        }

        function triggerUnlock() {
          if (state.mode !== "locked") {
            return;
          }

          state.mode = "unlocking";
          state.unlockStarted = performance.now();
          document.body.classList.add("is-unlocking");

          syncLayout(state.unlockStarted);

          const cx = state.width * 0.5;
          const cy = state.height * 0.5;
          const nodeCount = state.nodes.length;

          for (const node of state.nodes) {
            const dx = node.x - cx;
            const dy = node.y - cy;
            const distance = Math.max(1, Math.hypot(dx, dy));
            const outward = 1.35 + Math.random() * 3.1 + distance / Math.max(1, state.scale) * 0.45;
            node.vx = (dx / distance) * outward + (Math.random() - 0.5) * 0.7;
            node.vy = (dy / distance) * outward + (Math.random() - 0.5) * 0.7;
            node.free = true;
            node.fade = 1;

            addSpark(
              node.x,
              node.y,
              node.vx * (0.45 + Math.random() * 0.8),
              node.vy * (0.45 + Math.random() * 0.8),
              0.65 + Math.random() * 1.65,
            );
          }

          const burstCount = Math.min(120, Math.round(nodeCount * 0.65));
          for (let index = 0; index < burstCount; index += 1) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 1.8 + Math.random() * 5.2;
            addSpark(
              cx + (Math.random() - 0.5) * 20,
              cy + (Math.random() - 0.5) * 20,
              Math.cos(angle) * speed,
              Math.sin(angle) * speed * (0.7 + Math.random() * 0.55),
              0.95 + Math.random() * 2.1,
            );
          }

          window.setTimeout(() => {
            document.body.classList.add("is-revealed");
            contentCard.setAttribute("aria-hidden", "false");
            window.setTimeout(() => {
              state.mode = "revealed";
            }, 920);
          }, 1150);
        }

        function drawBackground() {
          ctx.fillStyle = "#000000";
          ctx.fillRect(0, 0, state.width, state.height);

          const cx = state.width * 0.5;
          const cy = state.height * 0.5;
          const glow = ctx.createRadialGradient(cx, cy, state.scale * 0.1, cx, cy, state.scale * 1.85);
          glow.addColorStop(0, "rgba(255, 92, 168, 0.09)");
          glow.addColorStop(0.3, "rgba(255, 92, 168, 0.045)");
          glow.addColorStop(1, "rgba(0, 0, 0, 0)");
          ctx.fillStyle = glow;
          ctx.fillRect(0, 0, state.width, state.height);
        }

        function drawLinks(progress) {
          const nodes = state.nodes;
          const maxDistance = state.scale * 0.36;
          const maxDistanceSq = maxDistance * maxDistance;
          const alphaBase = state.mode === "locked" ? 1 : Math.max(0, 1 - progress * 1.1);

          if (alphaBase <= 0.01) {
            return;
          }

          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.lineCap = "round";

          for (let i = 0; i < nodes.length; i += 1) {
            const a = nodes[i];
            for (let j = i + 1; j < nodes.length; j += 1) {
              const b = nodes[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const distanceSq = dx * dx + dy * dy;
              if (distanceSq >= maxDistanceSq) {
                continue;
              }

              const distance = Math.sqrt(distanceSq);
              const fade = (1 - distance / maxDistance) * 0.14 * alphaBase;
              if (fade <= 0.002) {
                continue;
              }

              ctx.strokeStyle = `rgba(255, 92, 168, ${fade})`;
              ctx.lineWidth = 0.8 + (1 - distance / maxDistance) * 0.9;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }

          ctx.restore();
        }

        function drawNodes(progress) {
          const alphaFade = state.mode === "locked" ? 1 : Math.max(0, 1 - progress * 1.15);
          if (alphaFade <= 0.01) {
            return;
          }

          ctx.save();
          ctx.globalCompositeOperation = "lighter";

          for (const node of state.nodes) {
            const alpha = node.alpha * node.fade * alphaFade;
            if (alpha <= 0.005) {
              continue;
            }

            const radius = node.size * (node.contour ? 1.25 : 1);

            ctx.fillStyle = `rgba(255, 92, 168, ${alpha * 0.2})`;
            ctx.beginPath();
            ctx.arc(node.x, node.y, radius * 3.8, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = `rgba(255, 196, 230, ${alpha})`;
            ctx.beginPath();
            ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }

        function updateFreeNodes(delta) {
          const drag = Math.pow(0.985, delta);
          for (const node of state.nodes) {
            if (!node.free) {
              continue;
            }

            node.x += node.vx * delta;
            node.y += node.vy * delta;
            node.vx *= drag;
            node.vy *= drag;
            node.vy -= 0.013 * delta;
            node.fade = Math.max(0, node.fade - 0.0075 * delta);
          }
        }

        function updateSparks(delta) {
          const drag = Math.pow(0.988, delta);
          for (const spark of state.sparks) {
            spark.x += spark.vx * delta;
            spark.y += spark.vy * delta;
            spark.vx *= drag;
            spark.vy *= drag;
            spark.vy -= 0.01 * delta;
            spark.life -= 0.0065 * delta;
            spark.spin += 0.035 * delta;
          }

          state.sparks = state.sparks.filter(
            (spark) =>
              spark.life > 0 &&
              spark.x > -120 &&
              spark.x < state.width + 120 &&
              spark.y > -120 &&
              spark.y < state.height + 120,
          );
        }

        function drawSparks(progress) {
          const alpha = state.mode === "locked" ? 0 : Math.max(0, 1 - progress * 0.95);
          if (alpha <= 0.01) {
            return;
          }

          ctx.save();
          ctx.globalCompositeOperation = "lighter";

          for (const spark of state.sparks) {
            const life = spark.life * alpha;
            if (life <= 0.01) {
              continue;
            }

            const size = spark.size * (0.85 + spark.twinkle * 0.65) * (0.8 + life * 0.7);
            ctx.save();
            ctx.translate(spark.x, spark.y);
            ctx.rotate(spark.spin);
            ctx.globalAlpha = life;
            ctx.strokeStyle = `rgba(255, 92, 168, ${0.42 * life})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(-size, 0);
            ctx.lineTo(size, 0);
            ctx.moveTo(0, -size);
            ctx.lineTo(0, size);
            ctx.stroke();

            ctx.fillStyle = `rgba(255, 255, 255, ${0.92 * life})`;
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          ctx.restore();
        }

        function render(now) {
          const delta = Math.min(2.2, (now - lastFrameTime) / 16.6667 || 1);
          lastFrameTime = now;

          drawBackground();

          if (state.mode === "locked") {
            syncLayout(now);
            drawLinks(0);
            drawNodes(0);
          } else {
            const progress = clamp((now - state.unlockStarted) / 1150, 0, 1);
            const eased = easeOutCubic(progress);
            updateFreeNodes(delta);
            updateSparks(delta);
            syncLayout(state.unlockStarted);
            drawLinks(eased);
            drawNodes(eased);
            drawSparks(eased);
          }

          if (state.mode !== "revealed") {
            requestAnimationFrame(render);
          }
        }

        function sanitizeInput(value) {
          return value.replace(/\D/g, "").slice(0, 3);
        }

        function updateLockVisual(value) {
          setLockSlots(value);
        }

        function handleInput() {
          const value = sanitizeInput(lockInput.value);
          if (value !== lockInput.value) {
            lockInput.value = value;
          }

          updateLockVisual(value);

          if (value.length === 3) {
            if (value === "157") {
              triggerUnlock();
            } else {
              shakeLock();
              lockInput.value = "";
              updateLockVisual("");
              window.setTimeout(() => {
                focusLockInput();
              }, 0);
            }
          }
        }

        lockInput.addEventListener("input", handleInput);
        lockInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && lockInput.value.length === 3) {
            handleInput();
          }
        });
        lockShell.addEventListener("pointerdown", () => {
          focusLockInput();
        });

        const debouncedResize = (() => {
          return () => {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(updateCanvasSize, 120);
          };
        })();

        window.addEventListener("resize", debouncedResize, { passive: true });
        window.addEventListener("orientationchange", debouncedResize, { passive: true });

        updateCanvasSize();
        updateLockVisual("");
        requestAnimationFrame(render);
      })();
    </script>
  </body>
</html>
